<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Barbeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../site/styles/style.css">
</head>
<body>
<div class="admin-container">
  <aside class="sidebar">
    <div class="logo">✂ Painel Barbeiro</div>
    <nav>
      <a href="#agenda">Agenda</a>
      <a href="#servicos">Serviços</a>
      <a href="#clientes">Clientes</a>
      <a href="#config">Configurações</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1>Minha Barbearia</h1>
      <button class="btn" onclick="logout()">Sair</button>
    </header>

    <section id="agenda">
      <h2>Agenda Hoje</h2>
      <table>
        <thead>
          <tr>
            <th>Hora</th>
            <th>Cliente</th>
            <th>Serviço</th>
            <th>Telefone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="agendaTable"></tbody>
      </table>
    </section>

    <section id="servicos">
      <h2>Meus Serviços</h2>
      <div class="form-grid">
        <input id="newService" placeholder="Novo serviço">
        <input id="servicePrice" placeholder="Preço R$">
        <button class="btn-gold" onclick="addService()">Adicionar</button>
      </div>
      <div id="myServices"></div>
    </section>

    <section id="clientes">
      <h2>Clientes Frequentes</h2>
      <div id="clientList"></div>
    </section>

    <section id="config">
      <h2>Configurações</h2>
      <div class="form-grid">
        <input id="nomeBarbearia" placeholder="Nome da barbearia">
        <input id="whatsapp" placeholder="WhatsApp">
        <button class="btn-gold" onclick="saveConfig()">Salvar</button>
      </div>
    </section>
  </main>
</div>

<script type="module" src="./admin-barber.js"></script>
</body>
</html>
